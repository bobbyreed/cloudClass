<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Netlify Example</title>
</head>
<body>
    <h1>CSCI 6343 - Cloud Development, Spring 2026</h1>
    <subtitle>Class Sessions Site</subtitle>
    <div class="nav">
        <a href="#"><button>Home (You Are Here)</button></a>
        <a href="./pages/clouds.html"><button>Clouds</button></a>
        <a href="./pages/netlifyJournal.html"><button>Netlify Journal</button></a>
        <a href="./pages/standing-up.html"><button>Standing-Up</button></a>
    </div>
    <script src="./script.js"></script>
    <ul class="visitor-list"></ul>
    <script>
        // Call the netlify function to get the visitor count and update the page
        fetch('/.netlify/functions/get-visitors')
            .then(response => response.json()) //parse JSON response
            .then(visitors => {
                const list = document.getElementById('visitor-list');
                visitors.forEach(v => {
                    const item = document.createElement('li');
                    item.textContent = v.name + ' - ' + v.visited_at;
                    list.appendChild(item);
                });
            })
            .catch(error => console.error('Function called failed: ', error));
    </script>
</body>
</html>
